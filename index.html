<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Selamat Hari Raya</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --black:   #05080a;
  --deep:    #080f0d;
  --green1:  #0e2a1c;
  --green2:  #173d28;
  --green3:  #1f5235;
  --emerald: #2d7a52;
  --glow:    #3aaf70;
  --gold:    #c8a84b;
  --gold2:   #e6cc80;
  --gold3:   #f5e9c0;
  --white:   #f0ede6;
  --offwhite:#d8d4ca;
  --muted:   #7a8a7e;
}

html,body{
  width:100%;
  height:100%;
  height:100dvh;
  background:var(--black);
  overflow:hidden;
  font-family:'Cormorant Garamond',serif;
}

/* ── FULL BLEED SCENE ── */
.scene{
  position:relative;
  width:100%;
  height:100%;
  height:100dvh;
  overflow:hidden;
}

/* ── SKY ── */
.sky{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 55% at 50% 0%, #0e2a1c 0%, #05080a 65%),
    linear-gradient(180deg,#080f0d 0%,#05080a 100%);
}

/* ── LETTERBOX — thinner on mobile ── */
.lb-top,.lb-bot{
  position:fixed;left:0;right:0;
  background:var(--black);
  z-index:200;
  pointer-events:none;
}
.lb-top{top:0;height:env(safe-area-inset-top,0px);}
.lb-bot{bottom:0;height:env(safe-area-inset-bottom,0px);}

/* ── STARS ── */
.stars{position:absolute;inset:0;z-index:2;pointer-events:none;}
.star{
  position:absolute;background:white;border-radius:50%;
  animation:starTwinkle var(--d) ease-in-out infinite;
  animation-delay:var(--dl);
}
@keyframes starTwinkle{
  0%,100%{opacity:var(--mo);transform:scale(1);}
  50%{opacity:1;transform:scale(1.6);}
}

/* ── MOON — centred high up ── */
.moon-wrap{
  position:absolute;
  top:clamp(40px,8vh,80px);
  left:50%;transform:translateX(-50%);
  z-index:5;
  animation:moonRise 2.2s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes moonRise{
  from{opacity:0;transform:translateX(-50%) translateY(24px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}
.moon{
  width:clamp(80px,22vw,120px);
  height:clamp(80px,22vw,120px);
  border-radius:50%;
  background:radial-gradient(circle at 38% 38%,
    #f5e9c0 0%,#e6cc80 30%,#c8a84b 65%,#8a6a20 100%);
  box-shadow:
    0 0 40px rgba(200,168,75,0.3),
    0 0 100px rgba(200,168,75,0.15),
    0 0 200px rgba(200,168,75,0.07);
  position:relative;
  animation:moonGlow 6s ease-in-out infinite;
}
@keyframes moonGlow{
  0%,100%{box-shadow:0 0 40px rgba(200,168,75,0.3),0 0 100px rgba(200,168,75,0.15),0 0 200px rgba(200,168,75,0.07);}
  50%    {box-shadow:0 0 65px rgba(200,168,75,0.4),0 0 140px rgba(200,168,75,0.22),0 0 280px rgba(200,168,75,0.1);}
}
.moon::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:rgba(160,120,30,0.3);top:20px;left:26px;}
.moon::after {content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(160,120,30,0.2);top:46px;left:52px;}

.moon-halo{
  position:absolute;border-radius:50%;
  border:1px solid rgba(200,168,75,0.07);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:haloBreath 4s ease-in-out infinite;
}
.halo1{width:clamp(120px,32vw,170px);height:clamp(120px,32vw,170px);}
.halo2{width:clamp(165px,44vw,220px);height:clamp(165px,44vw,220px);animation-delay:.5s;border-color:rgba(200,168,75,0.04);}
.halo3{width:clamp(220px,58vw,290px);height:clamp(220px,58vw,290px);animation-delay:1s; border-color:rgba(200,168,75,0.025);}
@keyframes haloBreath{
  0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1);}
  50%    {opacity:1; transform:translate(-50%,-50%) scale(1.05);}
}

/* ── KETUPAT — repositioned for portrait ── */
.ketupat-float{
  position:absolute;z-index:8;
  animation:ketFloat var(--dur) ease-in-out infinite,
            ketReveal 1.4s var(--rd) cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes ketFloat{
  0%,100%{transform:translateY(0) rotate(var(--r0));}
  50%    {transform:translateY(var(--dy)) rotate(var(--r1));}
}
@keyframes ketReveal{
  from{opacity:0;transform:translateY(18px) scale(0.8);}
  to  {opacity:1;transform:translateY(0)    scale(1);}
}

/* ── FIREFLIES ── */
.firefly{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--glow);
  box-shadow:0 0 6px var(--glow),0 0 12px rgba(58,175,112,0.5);
  animation:ffMove var(--dur) ease-in-out infinite;
  animation-delay:var(--dl);
  z-index:7;pointer-events:none;
}
@keyframes ffMove{
  0%  {transform:translate(0,0);opacity:0;}
  20% {opacity:.9;}
  50% {transform:translate(var(--tx),var(--ty));opacity:.5;}
  80% {opacity:.8;}
  100%{transform:translate(var(--tx2),var(--ty2));opacity:0;}
}

/* ── ATMOSPHERE ── */
.mist{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  background:
    radial-gradient(ellipse 130% 35% at 50% 100%,rgba(14,42,28,0.55) 0%,transparent 70%),
    radial-gradient(ellipse 70% 25% at 15% 85%,rgba(13,61,43,0.3) 0%,transparent 60%),
    radial-gradient(ellipse 70% 25% at 85% 88%,rgba(13,61,43,0.3) 0%,transparent 60%);
}
.vignette{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 35%,rgba(5,8,10,0.75) 100%);
}

/* ── LANDSCAPE SVG — taller crop for portrait ── */
.landscape{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  animation:landReveal 2s 0.7s both;
}
@keyframes landReveal{
  from{opacity:0;transform:translateY(16px);}
  to  {opacity:1;transform:translateY(0);}
}

/* ── TEXT LAYER — scrollable inner for very short phones ── */
.text-layer{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:10;
  padding:0 clamp(24px,6vw,44px) clamp(24px,6vh,48px);
  padding-bottom:calc(clamp(24px,6vh,48px) + env(safe-area-inset-bottom,0px));
  background:linear-gradient(to top,
    rgba(5,8,10,0.97) 0%,
    rgba(5,8,10,0.88) 35%,
    rgba(5,8,10,0.45) 62%,
    transparent 100%);
}

.eyebrow{
  font-family:'Cinzel',serif;
  font-size:clamp(0.52rem,2.4vw,0.65rem);
  letter-spacing:0.32em;
  color:var(--gold);
  text-transform:uppercase;
  opacity:0;
  animation:textUp 1s 1.3s forwards;
  display:block;
  margin-bottom:clamp(10px,2.5vh,18px);
}

.main-heading{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-style:italic;
  line-height:0.9;
  margin-bottom:clamp(12px,2.5vh,20px);
  opacity:0;
  animation:textUp 1.2s 1.5s forwards;
}
.heading-line1{
  font-size:clamp(52px,16vw,92px);
  color:var(--white);
  display:block;
  letter-spacing:-0.01em;
}
.heading-line2{
  font-size:clamp(34px,11vw,62px);
  color:var(--gold2);
  display:block;
  letter-spacing:0.03em;
}
.heading-line3{
  font-size:clamp(14px,4.5vw,24px);
  color:var(--muted);
  display:block;
  letter-spacing:0.2em;
  font-style:normal;
  font-family:'Cinzel',serif;
  font-weight:400;
  margin-top:6px;
}

.divider-line{
  display:flex;align-items:center;gap:12px;
  margin:clamp(12px,2.5vh,20px) 0;
  opacity:0;
  animation:textUp 1s 1.8s forwards;
}
.dl-bar{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);flex:1;}
.dl-icon{color:var(--gold);font-size:clamp(0.6rem,2.5vw,0.72rem);letter-spacing:0.08em;white-space:nowrap;}

.message{
  font-size:clamp(0.88rem,3.8vw,1.05rem);
  color:var(--offwhite);
  line-height:1.9;
  font-weight:300;
  opacity:0;
  animation:textUp 1s 2s forwards;
}
.message em{color:var(--gold2);font-style:italic;}

/* ── MUSIC — bigger touch target ── */
.music-row{
  display:flex;align-items:center;gap:14px;
  margin-top:clamp(16px,3.5vh,28px);
  opacity:0;
  animation:textUp 1s 2.2s forwards;
}
.music-play{
  width:48px;height:48px;
  border:1px solid rgba(200,168,75,0.4);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold2);font-size:1rem;
  cursor:pointer;
  background:rgba(200,168,75,0.07);
  flex-shrink:0;
  transition:background .25s,border-color .25s,box-shadow .25s;
  -webkit-touch-callout:none;user-select:none;
}
.music-play:active{
  background:rgba(200,168,75,0.2);
  border-color:var(--gold);
  box-shadow:0 0 24px rgba(200,168,75,0.3);
  transform:scale(0.94);
}
.music-info{flex:1;min-width:0;}
.music-track{
  font-family:'Cinzel',serif;
  font-size:clamp(0.58rem,2.4vw,0.66rem);
  letter-spacing:0.2em;
  color:var(--gold);
  text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.music-status{
  font-size:clamp(0.7rem,2.8vw,0.78rem);
  color:var(--muted);margin-top:2px;font-style:italic;
}
.eq-bars{display:flex;gap:3px;align-items:flex-end;height:20px;flex-shrink:0;}
.eq-bar{
  width:3px;border-radius:1px;
  background:linear-gradient(to top,var(--emerald),var(--glow));
  animation:eqDance var(--s) ease-in-out infinite alternate;
  animation-delay:var(--d);
}
@keyframes eqDance{from{height:3px;}to{height:var(--h);}}
.eq-bar:nth-child(1){--s:.6s;--d:0s;  --h:9px}
.eq-bar:nth-child(2){--s:.8s;--d:.1s; --h:16px}
.eq-bar:nth-child(3){--s:.5s;--d:.05s;--h:12px}
.eq-bar:nth-child(4){--s:.9s;--d:.15s;--h:20px}
.eq-bar:nth-child(5){--s:.7s;--d:.08s;--h:14px}
.eq-bar:nth-child(6){--s:.55s;--d:.12s;--h:9px}
.eq-bars.paused .eq-bar{animation-play-state:paused;height:3px;}

@keyframes textUp{
  from{opacity:0;transform:translateY(12px);}
  to  {opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<!-- safe-area bars -->
<div class="lb-top"></div>
<div class="lb-bot"></div>

<div class="scene">

  <div class="sky"></div>
  <div class="stars" id="stars"></div>

  <!-- MOON -->
  <div class="moon-wrap">
    <div class="moon-halo halo1"></div>

    <svg width="clamp(36px,10vw,52px)" height="clamp(42px,12vw,60px)" viewBox="0 0 48 56">

        <linearGradient id="kd2" x1="100%" y1="0%" x2="0%" y2="100%">

      </defs>

      <line x1="2" y1="24" x2="46" y2="24" stroke="rgba(200,168,75,.18)" stroke-width=".8"/>
      <line x1="24" y1="2" x2="24" y2="46" stroke="rgba(200,168,75,.18)" stroke-width=".8"/>
      <polygon points="24,11 37,24 24,37 11,24" fill="none" stroke="rgba(200,168,75,.3)" stroke-width=".8"/>
      <circle cx="24" cy="24" r="2.5" fill="rgba(200,168,75,.6)"/>
      <rect x="22" y="0" width="4" height="6" rx="2" fill="rgba(200,168,75,.4)"/>
      <line x1="24" y1="46" x2="24" y2="55" stroke="rgba(200,168,75,.35)" stroke-width="1.2"/>

<audio id="rayaAudio" src="Suasana_Hari_Raya_-_Anuar_Zain___Ellina.mp3" loop preload="auto"></audio>

<script>
// ── STARS ──
const sc=document.getElementById('stars');
for(let i=0;i<100;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+0.5;
  const mo=0.1+Math.random()*0.35;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*60}%;--d:${2+Math.random()*5}s;--dl:${Math.random()*5}s;--mo:${mo};opacity:${mo};`;
  sc.appendChild(s);
}

// ── FIREFLIES ──
const fc=document.getElementById('fireflies');
for(let i=0;i<10;i++){
  const f=document.createElement('div');
  f.className='firefly';
  const tx=(Math.random()-.5)*90,ty=(Math.random()-.5)*60;
  const tx2=(Math.random()-.5)*70,ty2=(Math.random()-.5)*50;
  f.style.cssText=`left:${10+Math.random()*80}%;top:${50+Math.random()*40}%;--dur:${5+Math.random()*8}s;--dl:${Math.random()*6}s;--tx:${tx}px;--ty:${ty}px;--tx2:${tx2}px;--ty2:${ty2}px;`;
  fc.appendChild(f);
}

// ── MP3 PLAYER ──
const audio = document.getElementById('rayaAudio');
let on = false;

function setUI(s){
  document.getElementById('playBtn').textContent = s ? '⏸' : '▶';
  document.getElementById('musicStatus').textContent = s ? 'Sedang bermain…' : 'Ketuk untuk memainkan muzik';
  const eq = document.getElementById('eqBars');
  s ? eq.classList.remove('paused') : eq.classList.add('paused');
}

function toggleMusic(){
  on = !on;
  if(on){ audio.play(); } else { audio.pause(); }
  setUI(on);
}

// Autoplay on load
window.addEventListener('load', () => {
  audio.play().then(() => {
    on = true;
    setUI(true);
  }).catch(() => {
    // Autoplay blocked — tunggu user interact
  });
});

// Resume on first touch/click (iOS & strict browsers)
function tryAutoplay(){
  if(!on){
    audio.play().then(() => {
      on = true;
      setUI(true);
    }).catch(()=>{});
  }
}
document.addEventListener('touchstart', tryAutoplay, { once: true, passive: true });
document.addEventListener('click', tryAutoplay, { once: true });
</script>
</body>
</html>
